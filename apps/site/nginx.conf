server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression for text-ish assets.
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
  gzip_min_length 1024;
  gzip_proxied any;

  # Sensible default security headers (the site is fully static so we can be
  # strict). Tighten further (CSP) when /docs and /blog land.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "interest-cohort=()" always;

  # Long cache for fingerprinted static assets emitted by Next.js export.
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # HTML must always revalidate so a redeploy is visible immediately.
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, must-revalidate";
  }

  # Trailing-slash + .html fallback. Final fallback to /index.html keeps
  # accidental routes from returning a bare 404.
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }
}
