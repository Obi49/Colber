<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Colber — Trust, coordination & continuity for the agent economy.">
  <title>Colber</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <style>
      .h1 { font-family: Inter, system-ui, sans-serif; font-weight: 800; font-size: 72px; letter-spacing: -0.03em; fill: #F8FAFC; }
      .sub { font-family: Inter, system-ui, sans-serif; font-weight: 500; font-size: 32px; fill: #CBD5E1; }
      .pill { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 20px; fill: #94A3B8; }
      .accent { fill: #1E3A8A; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 5 module dots -->
  <g transform="translate(80, 80)">
    <circle cx="0"  cy="0" r="14" fill="#1E3A8A"/>
    <circle cx="40" cy="0" r="14" fill="#7C3AED"/>
    <circle cx="80" cy="0" r="14" fill="#0891B2"/>
    <circle cx="120" cy="0" r="14" fill="#EA580C"/>
    <circle cx="160" cy="0" r="14" fill="#059669"/>
  </g>

  <text x="80" y="270" class="h1">Colber</text>
  <text x="80" y="350" class="sub">Trust, coordination &amp; continuity</text>
  <text x="80" y="395" class="sub">for the agent economy.</text>

  <text x="80" y="540" class="pill">Reputation · Memory · Observability · Negotiation · Insurance</text>
  <text x="80" y="575" class="pill">MCP-native · Apache-2.0 · github.com/Obi49/Colber</text>
</svg>
