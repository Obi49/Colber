name: colber

# ------------------------------------------------------------------
# Stack des services applicatifs Colber (P1 sprints 1-7).
#
# À lancer depuis colber-stack/ avec :
#   docker compose -f docker-compose.yml -f docker-compose.services.yml up -d
#
# Le réseau colber_net est défini dans le compose principal.
# Les services se connectent aux datastores via les hostnames internes
# (postgres, redis, neo4j, qdrant, ollama) — pas via les ports décalés.
# ------------------------------------------------------------------

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  # ------- AGENT-IDENTITY -------

  agent-identity:
    image: colber/agent-identity:dev
    container_name: colber-agent-identity
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/agent-identity/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: agent-identity
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4001
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4002
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_identity
      PRETTY_LOGS: 'false'
    ports:
      - '14001:4001'
      - '14002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4001/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging

  # ------- REPUTATION -------

  reputation:
    image: colber/reputation:dev
    container_name: colber-reputation
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/reputation/Dockerfile
    env_file:
      - path: ./services.env
        required: true
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: reputation
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4011
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4012
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_reputation
      NEO4J_BOLT_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: colber_dev
      NEO4J_DATABASE: neo4j
      REDIS_URL: redis://redis:6379
      REPUTATION_SCORE_TX_DELTA: '10'
      REPUTATION_SCORE_NEG_FEEDBACK_PENALTY: '40'
      REPUTATION_SCORE_DECAY_DAYS: '90'
      REPUTATION_SCORE_CACHE_TTL_SECONDS: '60'
      PRETTY_LOGS: 'false'
    ports:
      - '14011:4011'
      - '14012:4012'
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4011/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging

  # ------- MEMORY -------

  memory:
    image: colber/memory:dev
    container_name: colber-memory
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/memory/Dockerfile
    env_file:
      - path: ./services.env
        required: true
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: memory
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4021
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4022
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_memory
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: colber_memories
      MEMORY_EMBEDDING_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      MEMORY_EMBEDDING_DIM: '768'
      MEMORY_MAX_VERSIONS: '100'
      PRETTY_LOGS: 'false'
    ports:
      - '14021:4021'
      - '14022:4022'
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4021/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging

  # ------- NEGOTIATION -------

  negotiation:
    image: colber/negotiation:dev
    container_name: colber-negotiation
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/negotiation/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: negotiation
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4041
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4042
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_negotiation
      NEGOTIATION_DEFAULT_DEADLINE_HOURS: '24'
      NEGOTIATION_MAX_PROPOSALS_PER_NEGOTIATION: '200'
      NEGOTIATION_MAX_PARTIES: '16'
      PRETTY_LOGS: 'false'
    ports:
      - '14041:4041'
      - '14042:4042'
    depends_on:
      postgres:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4041/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging

  # ------- INSURANCE -------

  insurance:
    image: colber/insurance:dev
    container_name: colber-insurance
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/insurance/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: insurance
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4051
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4052
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_insurance
      REPUTATION_URL: http://reputation:4011
      INSURANCE_BASE_RATE_BPS: '200'
      INSURANCE_QUOTE_VALIDITY_SECONDS: '300'
      INSURANCE_MAX_GLOBAL_EXPOSURE_USDC: '100000'
      INSURANCE_DEFAULT_POLICY_DURATION_HOURS: '168'
      INSURANCE_REPUTATION_CACHE_TTL_SECONDS: '60'
      INSURANCE_ADMIN_ENABLED: 'true'
      PRETTY_LOGS: 'false'
    ports:
      - '14051:4051'
      - '14052:4052'
    depends_on:
      postgres:
        condition: service_healthy
      reputation:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4051/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging

  # ------- OBSERVABILITY -------

  observability:
    image: colber/observability:dev
    container_name: colber-observability
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/observability/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: observability
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4031
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4032
      DATABASE_URL: postgresql://colber:colber_dev@postgres:5432/colber_observability
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: colber
      CLICKHOUSE_PASSWORD: colber_dev
      CLICKHOUSE_DATABASE: colber
      OBSERVABILITY_FLUSH_INTERVAL_MS: '1000'
      OBSERVABILITY_FLUSH_BATCH: '500'
      OBSERVABILITY_MAX_EVENTS_PER_REQUEST: '1000'
      OBSERVABILITY_MAX_QUERY_LIMIT: '1000'
      OBSERVABILITY_LOG_TTL_DAYS: '30'
      OBSERVABILITY_SPAN_TTL_DAYS: '30'
      PRETTY_LOGS: 'false'
    ports:
      - '14031:4031'
      - '14032:4032'
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4031/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [colber_net]
    logging: *default-logging
