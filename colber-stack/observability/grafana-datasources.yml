apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: agentstack
      port: 9000
      server: clickhouse
      username: agentstack
      tlsSkipVerify: true
    secureJsonData:
      password: agentstack_dev
