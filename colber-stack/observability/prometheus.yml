global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets: ['nats:8222']

