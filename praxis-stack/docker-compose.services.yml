name: praxis

# ------------------------------------------------------------------
# Stack des services applicatifs Praxis (P1 sprints 1-7).
#
# À lancer depuis praxis-stack/ avec :
#   docker compose -f docker-compose.yml -f docker-compose.services.yml up -d
#
# Le réseau praxis_net est défini dans le compose principal.
# Les services se connectent aux datastores via les hostnames internes
# (postgres, redis, neo4j, qdrant, ollama) — pas via les ports décalés.
# ------------------------------------------------------------------

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  # ------- AGENT-IDENTITY -------

  agent-identity:
    image: praxis/agent-identity:dev
    container_name: praxis-agent-identity
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/agent-identity/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: agent-identity
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4001
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4002
      DATABASE_URL: postgresql://praxis:praxis_dev@postgres:5432/praxis
      PRETTY_LOGS: 'false'
    ports:
      - '14001:4001'
      - '14002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4001/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [praxis_net]
    logging: *default-logging

  # ------- REPUTATION -------

  reputation:
    image: praxis/reputation:dev
    container_name: praxis-reputation
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/reputation/Dockerfile
    env_file:
      - path: ./services.env
        required: true
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: reputation
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4011
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4012
      DATABASE_URL: postgresql://praxis:praxis_dev@postgres:5432/praxis
      NEO4J_BOLT_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: praxis_dev
      NEO4J_DATABASE: neo4j
      REDIS_URL: redis://redis:6379
      REPUTATION_SCORE_TX_DELTA: '10'
      REPUTATION_SCORE_NEG_FEEDBACK_PENALTY: '40'
      REPUTATION_SCORE_DECAY_DAYS: '90'
      REPUTATION_SCORE_CACHE_TTL_SECONDS: '60'
      PRETTY_LOGS: 'false'
    ports:
      - '14011:4011'
      - '14012:4012'
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4011/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [praxis_net]
    logging: *default-logging

  # ------- MEMORY -------

  memory:
    image: praxis/memory:dev
    container_name: praxis-memory
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/memory/Dockerfile
    env_file:
      - path: ./services.env
        required: true
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      SERVICE_NAME: memory
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4021
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 4022
      DATABASE_URL: postgresql://praxis:praxis_dev@postgres:5432/praxis
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: praxis_memories
      MEMORY_EMBEDDING_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      MEMORY_EMBEDDING_DIM: '768'
      MEMORY_MAX_VERSIONS: '100'
      PRETTY_LOGS: 'false'
    ports:
      - '14021:4021'
      - '14022:4022'
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      agent-identity:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4021/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [praxis_net]
    logging: *default-logging
