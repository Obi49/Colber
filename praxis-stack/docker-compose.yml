name: praxis

# ------------------------------------------------------------------
# Stack de test Praxis — option A (cohabitation avec ShowWeb3)
# Tous les ports externes sont décalés pour éviter tout conflit
# avec les services existants sur la VM showweb3.
# ------------------------------------------------------------------

networks:
  praxis_net:
    name: praxis_net
    driver: bridge

volumes:
  pg_data:
  redis_data:
  nats_data:
  qdrant_data:
  clickhouse_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
  ollama_data:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ------- BASES DE DONNÉES -------

  postgres:
    image: postgres:16-alpine
    container_name: praxis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis_dev
      POSTGRES_DB: praxis
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis -d praxis"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: praxis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  nats:
    image: nats:2.10-alpine
    container_name: praxis-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "14222:4222"
      - "18222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: praxis-qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: praxis-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: praxis
      CLICKHOUSE_PASSWORD: praxis_dev
      CLICKHOUSE_DB: praxis
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=praxis --password=praxis_dev --query='SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [praxis_net]
    logging: *default-logging

  neo4j:
    image: neo4j:5-community
    container_name: praxis-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/praxis_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "17474:7474"
      - "17687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [praxis_net]
    logging: *default-logging

  # ------- EMBEDDINGS (self-hosted) -------

  ollama:
    image: ollama/ollama:0.4.7
    container_name: praxis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  ollama-init:
    image: ollama/ollama:0.4.7
    container_name: praxis-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "OLLAMA_HOST=ollama:11434 ollama pull nomic-embed-text && echo 'nomic-embed-text ready'"
    networks: [praxis_net]
    restart: "no"
    logging: *default-logging

  # ------- OBSERVABILITÉ -------

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: praxis-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "19090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.3.0
    container_name: praxis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: praxis_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [praxis_net]
    logging: *default-logging

  # ------- REVERSE PROXY INTERNE -------

  traefik:
    image: traefik:v3.2
    container_name: praxis-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.dashboard.address=:8080"
    ports:
      - "18000:80"
      - "18080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [praxis_net]
    logging: *default-logging
